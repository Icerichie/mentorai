<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartAna</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root{
  --bg:#07091A;--surface:#0D1027;--card:#131830;--card2:#192040;
  --border:#1E2650;--border2:#2A3568;
  --blue:#5B8DEF;--blue-dim:rgba(91,141,239,.12);--blue-glow:rgba(91,141,239,.3);
  --amber:#F0A040;--amber-dim:rgba(240,160,64,.12);--amber-glow:rgba(240,160,64,.35);
  --teal:#3DD6A3;--teal-dim:rgba(61,214,163,.12);
  --pink:#E879B0;
  --text:#DDE2F5;--text-muted:#7B84AA;--text-dim:#4A5278;
  --radius:14px;--radius-sm:8px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --font-h:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body,#root{height:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);overflow-x:hidden;line-height:1.6;}
#root{min-height:100%;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
@keyframes shimmer{0%{background-position:-200% center;}100%{background-position:200% center;}}
@keyframes slideUp{from{transform:translateY(10px);opacity:0;}to{transform:translateY(0);opacity:1;}}
@keyframes starTwinkle{0%,100%{opacity:.25;}50%{opacity:.9;}}
@keyframes ripple{0%{transform:scale(1);opacity:.5;}100%{transform:scale(2.8);opacity:0;}}
@keyframes speakGlow{0%{opacity:.4;}100%{opacity:1;}}
@keyframes pipeFlow{0%{opacity:.3;transform:translateY(-4px);}100%{opacity:1;transform:translateY(4px);}}
@keyframes pipeActive{0%{box-shadow:0 0 0 0 var(--blue-glow);}50%{box-shadow:0 0 0 8px transparent;}100%{box-shadow:0 0 0 0 transparent;}}
@keyframes gradBg{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}

.fade-up{animation:fadeUp .45s ease forwards;}
.fade-in{animation:fadeIn .35s ease forwards;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:var(--radius-sm);font-family:var(--font-h);font-weight:600;font-size:14px;cursor:pointer;border:none;transition:all .2s;white-space:nowrap;}
.btn-primary{background:var(--blue);color:#fff;box-shadow:0 4px 16px var(--blue-glow);}
.btn-primary:hover{background:#6B9EFF;transform:translateY(-1px);box-shadow:0 6px 24px var(--blue-glow);}
.btn-amber{background:var(--amber);color:#0A0B14;box-shadow:0 4px 14px var(--amber-glow);}
.btn-amber:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--card2);border-color:var(--blue);}
.btn-sm{padding:7px 15px;font-size:13px;}
.btn-lg{padding:14px 32px;font-size:15px;border-radius:10px;}
.w-full{width:100%;justify-content:center;}

.input{width:100%;padding:11px 15px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-b);font-size:14px;outline:none;transition:all .2s;}
.input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-dim);}
.input::placeholder{color:var(--text-dim);}

.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;font-family:var(--font-h);}
.badge-blue{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(91,141,239,.25);}
.badge-amber{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(240,160,64,.25);}
.badge-teal{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(61,214,163,.25);}

/* STARS */
.stars-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:#fff;animation:starTwinkle linear infinite;}

/* NAVBAR */
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 48px;background:rgba(7,9,26,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;font-family:var(--font-h);font-size:21px;font-weight:800;color:var(--text);}
.logo-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--blue),var(--pink));display:flex;align-items:center;justify-content:center;font-size:17px;}

/* LANDING */
.hero{position:relative;z-index:1;padding:88px 48px 64px;text-align:center;max-width:840px;margin:0 auto;}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600;background:var(--amber-dim);color:var(--amber);border:1px solid rgba(240,160,64,.3);margin-bottom:22px;}
.hero h1{font-family:var(--font-h);font-size:clamp(36px,5.5vw,66px);font-weight:800;line-height:1.1;margin-bottom:18px;}
.grad{background:linear-gradient(90deg,var(--blue),var(--pink),var(--amber));background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s linear infinite;}
.hero p{font-size:17px;color:var(--text-muted);max-width:560px;margin:0 auto 34px;line-height:1.75;}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.feat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px;padding:0 48px 72px;max-width:1060px;margin:0 auto;position:relative;z-index:1;}
.feat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:26px;transition:all .22s;}
.feat-card:hover{transform:translateY(-4px);border-color:var(--border2);}
.feat-icon{width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;margin-bottom:14px;}
.feat-card h3{font-family:var(--font-h);font-size:15.5px;font-weight:700;margin-bottom:7px;}
.feat-card p{font-size:13px;color:var(--text-muted);line-height:1.65;}
.chips-section{padding:0 48px 90px;max-width:1060px;margin:0 auto;text-align:center;position:relative;z-index:1;}
.chips-section h2{font-family:var(--font-h);font-size:25px;font-weight:800;margin-bottom:18px;}
.chips{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;}
.chip{padding:9px 18px;border-radius:30px;background:var(--surface);border:1px solid var(--border2);font-size:13.5px;font-weight:500;display:flex;align-items:center;gap:7px;cursor:pointer;transition:all .2s;}
.chip:hover{background:var(--card2);border-color:var(--blue);color:var(--blue);transform:scale(1.04);}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;z-index:1;}
.auth-card{width:100%;max-width:420px;background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:38px;box-shadow:var(--shadow);}
.auth-tabs{display:flex;border-radius:10px;background:var(--surface);padding:4px;margin-bottom:26px;}
.auth-tab{flex:1;padding:9px;text-align:center;border-radius:7px;cursor:pointer;font-family:var(--font-h);font-weight:600;font-size:14px;transition:all .2s;color:var(--text-muted);border:none;background:transparent;}
.auth-tab.on{background:var(--blue);color:#fff;box-shadow:0 2px 10px var(--blue-glow);}
.flabel{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--text-muted);}
.fgroup{margin-bottom:15px;}

/* SKILL SELECT */
.page-wrap{min-height:100vh;padding:38px 48px;position:relative;z-index:1;}
.pg-head{margin-bottom:32px;}
.pg-head h1{font-family:var(--font-h);font-size:28px;font-weight:800;margin-bottom:7px;}
.pg-head p{color:var(--text-muted);font-size:15px;}
.skgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px;max-width:1060px;}
.skcard{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:24px 20px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden;}
.skcard::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--blue-dim),transparent);opacity:0;transition:opacity .22s;}
.skcard:hover{border-color:var(--blue);transform:translateY(-4px);}
.skcard:hover::before{opacity:1;}
.skcard h3{font-family:var(--font-h);font-size:15.5px;font-weight:700;margin:10px 0 4px;}
.skcard p{font-size:12.5px;color:var(--text-muted);}

/* ASSESSMENT */
.as-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;position:relative;z-index:1;}
.as-card{width:100%;max-width:620px;background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:38px;box-shadow:var(--shadow);}
.as-prog{display:flex;gap:5px;margin-bottom:28px;}
.as-step{height:4px;flex:1;border-radius:2px;background:var(--border2);transition:background .3s;}
.as-step.done{background:var(--blue);}
.as-step.cur{background:var(--amber);}
.qtext{font-family:var(--font-h);font-size:18px;font-weight:700;margin-bottom:20px;line-height:1.45;}
.opt{display:block;width:100%;padding:12px 17px;margin-bottom:9px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);text-align:left;cursor:pointer;font-family:var(--font-b);font-size:14px;color:var(--text);transition:all .18s;}
.opt:hover{background:var(--card2);border-color:var(--blue);color:var(--blue);}
.opt.sel{background:var(--blue-dim);border-color:var(--blue);color:var(--blue);}

/* ROADMAP */
.rm-wrap{max-width:660px;margin:0 auto;padding:50px 22px;position:relative;z-index:1;}
.lvl-banner{border-radius:var(--radius);padding:24px 28px;margin-bottom:28px;background:linear-gradient(135deg,var(--amber-dim),var(--blue-dim));border:1px solid rgba(240,160,64,.2);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.lvl-banner h2{font-family:var(--font-h);font-size:19px;font-weight:800;}
.ls-list{display:flex;flex-direction:column;gap:9px;margin-bottom:26px;}
.ls-item{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;transition:all .2s;}
.ls-item:hover{border-color:var(--border2);}
.ls-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--blue-dim);color:var(--blue);font-family:var(--font-h);font-weight:700;font-size:13px;flex-shrink:0;}
.ls-info h4{font-family:var(--font-h);font-weight:700;font-size:14px;margin-bottom:3px;}
.ls-info p{font-size:12px;color:var(--text-muted);}

/* ═══════════════════════════════════════════
   TUTOR PAGE  –  16:9 screen + bottom chat
═══════════════════════════════════════════ */
.tutor-page{height:100vh;display:flex;flex-direction:column;background:var(--bg);}
.tutor-topbar{flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);padding:11px 26px;display:flex;align-items:center;gap:13px;}
.tutor-body{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:14px 22px 0;gap:12px;max-width:1200px;width:100%;margin:0 auto;align-self:center;width:100%;}

/* screen occupies remaining space, maintaining 16:9 */
.screen-stage{flex:1;min-height:0;display:flex;flex-direction:column;}
.screen-frame{width:100%;height:100%;background:#0A0C20;border:1.5px solid var(--border2);border-radius:14px;box-shadow:0 0 0 5px rgba(91,141,239,.05),var(--shadow);overflow:hidden;display:flex;flex-direction:column;}
.screen-chrome{background:#0D1028;border-bottom:1px solid var(--border);padding:7px 13px;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.chrome-dot{width:10px;height:10px;border-radius:50%;}

/* Inside screen: avatar left + lesson right */
.screen-inner{flex:1;overflow:hidden;display:grid;grid-template-columns:280px 1fr;gap:0;}
.avatar-panel{border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:18px 14px;gap:14px;background:linear-gradient(180deg,#0D1228 0%,#080A1C 100%);overflow:hidden;}
.lesson-panel{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px;}

/* Pipeline indicator */
.pipeline{display:flex;flex-direction:column;gap:4px;width:100%;}
.pipe-step{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);transition:all .3s;font-size:11px;font-family:var(--font-h);font-weight:600;color:var(--text-muted);}
.pipe-step.active{border-color:var(--blue);background:var(--blue-dim);color:var(--blue);animation:pipeActive 1.5s ease infinite;}
.pipe-step.done{border-color:var(--teal);background:var(--teal-dim);color:var(--teal);}
.pipe-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;}
.pipe-arrow{color:var(--text-dim);font-size:10px;text-align:center;margin:1px 0;animation:pipeFlow 1s ease-in-out infinite alternate;}

/* Canvas avatar */
.avatar-canvas-wrap{position:relative;width:180px;flex-shrink:0;}
.avatar-canvas-wrap canvas{width:180px;height:200px;border-radius:50% 50% 45% 45%;display:block;}
.avatar-glow{position:absolute;inset:-12px;border-radius:50%;background:radial-gradient(circle,var(--blue-glow),transparent 70%);pointer-events:none;animation:pulse 2.5s ease-in-out infinite;}
.speaking-ring{position:absolute;inset:-8px;border-radius:50%;border:2px solid var(--blue);opacity:0;transition:opacity .3s;}
.avatar-fullscreen{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#0D1228 0%,#050710 100%);}
.avatar-canvas-fullscreen{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.avatar-canvas-fullscreen canvas{width:auto;height:100%;max-height:100%;border-radius:0;}
.speaking-ring.on{opacity:1;animation:ripple 1.8s ease-out infinite;}

/* Text transcript inside avatar panel */
.avatar-label{font-family:var(--font-h);font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:1px;}
.speaking-badge{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:var(--blue-dim);border:1px solid rgba(91,141,239,.3);font-size:11px;font-weight:600;font-family:var(--font-h);color:var(--blue);}
.sound-bars{display:flex;align-items:flex-end;gap:2px;height:14px;}
.bar{width:3px;background:var(--blue);border-radius:2px;animation:soundBar .7s ease-in-out infinite alternate;}
@keyframes soundBar{from{height:3px;}to{height:14px;}}

/* Lesson text area */
.lesson-bubble{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;font-size:13.5px;line-height:1.82;color:var(--text);white-space:pre-wrap;word-wrap:break-word;flex:1;}
.lesson-bubble h3{font-family:var(--font-h);font-size:15px;color:var(--amber);margin-bottom:10px;}
.code-block{background:#060810;color:#A8D0FF;border-radius:8px;padding:13px 15px;font-family:'Courier New',monospace;font-size:12px;overflow-x:auto;white-space:pre;margin:8px 0;border-left:3px solid var(--blue);}
.cur-blink{display:inline-block;width:2px;height:14px;background:var(--blue);margin-left:2px;vertical-align:middle;animation:pulse .8s ease-in-out infinite;}
.practice-box{background:#120F04;border:1px solid rgba(240,160,64,.25);border-radius:11px;padding:16px 18px;margin-top:4px;}
.practice-box h4{font-family:var(--font-h);font-size:13px;color:var(--amber);margin-bottom:7px;}
.p-textarea{width:100%;min-height:56px;padding:9px 13px;resize:vertical;background:var(--surface);border:1px solid var(--border2);border-radius:8px;font-family:var(--font-b);font-size:13px;color:var(--text);outline:none;}
.p-textarea:focus{border-color:var(--amber);}

/* ── HORIZONTAL CHAT BAR ── */
.chat-bar{flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:12px 12px 0 0;overflow:hidden;display:flex;flex-direction:column;max-height:200px;}
.chat-bar-head{padding:7px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--card);flex-shrink:0;}
.chat-bar-head span{font-family:var(--font-h);font-size:12.5px;font-weight:700;color:var(--text);}
.chat-bar-msgs{flex:1;overflow-y:auto;padding:8px 13px;display:flex;flex-direction:column;gap:5px;}
.cmsg{max-width:420px;padding:7px 11px;border-radius:9px;font-size:13px;line-height:1.5;animation:slideUp .22s ease;}
.cmsg.user{background:var(--blue);color:#fff;border-bottom-right-radius:3px;margin-left:auto;}
.cmsg.ai{background:var(--card);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:3px;}
.chat-bar-row{padding:9px 12px;border-top:1px solid var(--border);display:flex;gap:7px;align-items:center;flex-shrink:0;}
.chat-bar-in{flex:1;padding:8px 13px;background:var(--card);border:1px solid var(--border2);border-radius:8px;font-family:var(--font-b);font-size:13.5px;color:var(--text);outline:none;}
.chat-bar-in:focus{border-color:var(--blue);}
.chat-bar-in::placeholder{color:var(--text-dim);}
.send-btn{padding:8px 18px;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:var(--font-h);font-weight:600;font-size:13px;transition:all .18s;display:flex;align-items:center;gap:5px;}
.send-btn:hover{background:#6B9EFF;}
.send-btn:disabled{opacity:.5;cursor:not-allowed;}
.quick-btn{padding:5px 11px;border-radius:20px;background:var(--card);border:1px solid var(--border2);font-size:12px;cursor:pointer;color:var(--text-muted);font-family:var(--font-b);white-space:nowrap;transition:all .15s;}
.quick-btn:hover{border-color:var(--blue);color:var(--blue);}

/* DASHBOARD */
.dash-wrap{max-width:940px;margin:0 auto;padding:42px 22px;position:relative;z-index:1;}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:13px;margin-bottom:24px;}
.st-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
.st-lbl{font-size:12px;color:var(--text-muted);margin-bottom:5px;font-weight:500;}
.st-val{font-family:var(--font-h);font-size:28px;font-weight:800;}
.prog-wrap{margin-top:7px;height:5px;background:var(--border2);border-radius:3px;overflow:hidden;}
.prog-bar{height:100%;border-radius:3px;background:var(--blue);transition:width .8s ease;}
.trk{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px;}
.trk h3{font-family:var(--font-h);font-size:16px;font-weight:700;margin-bottom:13px;}
.trk-row{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--border);}
.trk-row:last-child{border-bottom:none;}
.trk-ck{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;font-weight:700;}
.trk-ck.done{background:var(--teal-dim);color:var(--teal);}
.trk-ck.cur{background:var(--blue-dim);color:var(--blue);}
.trk-ck.lock{background:var(--border);color:var(--text-dim);}

/* LOADING */
.loading-screen{position:fixed;inset:0;background:rgba(7,9,26,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(10px);}
.load-orb{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--pink));display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:18px;box-shadow:0 8px 38px var(--blue-glow);animation:float 2.5s ease-in-out infinite;}
.loading-screen h3{font-family:var(--font-h);font-size:17px;font-weight:700;margin-bottom:5px;}
.loading-screen p{font-size:13.5px;color:var(--text-muted);}
.dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--blue);margin:0 3px;animation:pulse 1.2s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}

.tts-pill{padding:5px 12px;border-radius:20px;cursor:pointer;font-size:12px;font-family:var(--font-b);font-weight:500;border:1px solid var(--border2);background:transparent;color:var(--text-muted);transition:all .18s;display:flex;align-items:center;gap:5px;}
.tts-pill:hover{border-color:var(--amber);color:var(--amber);}
.tts-pill.on{background:var(--amber-dim);border-color:var(--amber);color:var(--amber);}

@media(max-width:768px){
  .nav{padding:12px 16px;}
  .hero{padding:50px 18px;}
  .feat-grid,.chips-section{padding-left:18px;padding-right:18px;}
  .page-wrap{padding:26px 16px;}
  .tutor-body{padding:8px 8px 0;}
  .screen-inner{grid-template-columns:1fr;}
  .avatar-panel{display:none;}
}

async function callAI(messages, system='', maxTokens=900) {
  const body = {model:'claude-sonnet-4-20250514',max_tokens:maxTokens,messages};
  if(system) body.system=system;
  const res = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  return data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
}

        {!speaking && pipelineStage !== 'idle' && pipelineStage !== 'done' && (
          <div style={{
            position:'absolute', bottom:24, left:'50%', transform:'translateX(-50%)',
            display:'flex', alignItems:'center', gap:8, padding:'7px 18px',
            background:'rgba(10,11,20,0.75)', border:'1px solid rgba(240,160,64,0.3)',
            borderRadius:20, backdropFilter:'blur(10px)',
          }}>
            <Spin s={12}/>
            <span style={{fontSize:12,color:'#F0A040',fontWeight:600,fontFamily:'var(--font-h)'}}>Processing...</span>
          </div>
        )}
      </div>
    );
  }

  // Sidebar mode (non-fullscreen — kept for compatibility)
  return (
    <div className="avatar-panel">
      <div className="avatar-label">AI Tutor</div>
      <div style={{position:'relative',width:160,borderRadius:12,overflow:'hidden',flexShrink:0}}>
        <img src={TUTOR_IMG} alt="AI Tutor" style={{width:'100%',display:'block',objectFit:'cover',objectPosition:'center top',height:190}}/>
        {speaking && <div style={{position:'absolute',inset:0,boxShadow:'inset 0 0 20px rgba(91,141,239,0.5)',borderRadius:12}}/>}
      </div>
      {speaking ? (
        <div className="speaking-badge">
          <div className="sound-bars">{[1,2,3,4].map(i=><div key={i} className="bar" style={{animationDelay:`${i*0.15}s`}}/>)}</div>
          Speaking...
        </div>
      ) : (
        <div style={{fontSize:11,color:'var(--text-dim)',fontFamily:'var(--font-h)',textAlign:'center'}}>
          {pipelineStage==='idle'?'Ready to teach':'Processing...'}
        </div>
      )}
      <div className="pipeline">
        {pipeSteps.map((step, i) => {
          const stepIdx = stageOrder.indexOf(step.key);
          const isDone = curIdx > stepIdx;
          const isActive = stageOrder[curIdx] === step.key;
          return (
            <React.Fragment key={step.key}>
              <div className={`pipe-step ${isActive?'active':''} ${isDone?'done':''}`}>
                <div className="pipe-dot"/>
                <span style={{fontSize:10}}>{step.icon}</span>
                <span>{step.label}</span>
                {isDone && <span style={{marginLeft:'auto',fontSize:10}}>✓</span>}
              </div>
              {i < pipeSteps.length - 1 && (
                <div className="pipe-arrow" style={{animationDelay:`${i*0.2}s`}}>↓</div>
              )}
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
}

// ── TTS + Pipeline integration ─────────────────────────
function speakWithPipeline(text, onStageChange, onDone) {
  if(!window.speechSynthesis) {
    onStageChange('avatar');
    setTimeout(()=>{ onStageChange('done'); onDone(); }, 3000);
    return;
  }
  window.speechSynthesis.cancel();
  const clean = text.replace(/```[\s\S]*?```/g,'a code example').replace(/[#*`]/g,'').slice(0,900);
  const utt = new SpeechSynthesisUtterance(clean);
  utt.rate = 0.88;
  utt.onstart = () => onStageChange('avatar');
  utt.onend = () => { onStageChange('done'); onDone(); };
  utt.onerror = () => { onStageChange('done'); onDone(); };
  window.speechSynthesis.speak(utt);
}
function stopSpeak(){ window.speechSynthesis?.cancel(); }

  const [qs,setQs]=useState(null);const [cur,setCur]=useState(0);const [ans,setAns]=useState([]);const [loading,setLoading]=useState(true);const [evaluating,setEvaluating]=useState(false);const [sel,setSel]=useState(null);

  async function evaluate(a){setEvaluating(true);try{const sm=qs.map((q,i)=>`Q: ${q.q}\nAnswer: ${q.options[a[i]]}`).join('\n\n');const r=await callAI([{role:'user',content:`Assess learner for ${skill.name}. Return ONLY JSON: {"level":"beginner|intermediate|advanced","explanation":"2 sentences"}\n\n${sm}`}],'Return ONLY valid JSON.',250);const res=JSON.parse(r.replace(/```json|```/g,'').trim());onComplete(res.level,res.explanation);}catch{const s=a.filter((v,i)=>v===qs[i].correct).length;onComplete(s<=1?'beginner':s<=3?'intermediate':'advanced',`Based on your responses, you're at ${s<=1?'beginner':s<=3?'intermediate':'advanced'} level for ${skill.name}.`);}}
  if(loading)return <Loading msg={`Building ${skill.name} assessment...`}/>;

  const q=qs[cur];
  return(<div style={{position:'relative',minHeight:'100vh'}}><Stars/><div className="as-wrap"><div className="as-card fade-up">
    <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:20}}><span style={{fontSize:24}}>{skill.emoji}</span><div><div style={{fontFamily:'var(--font-h)',fontWeight:700,fontSize:14}}>{skill.name} Assessment</div><div style={{fontSize:12.5,color:'var(--text-muted)'}}>Question {cur+1} of {qs.length}</div></div></div>
    <div className="as-prog">{qs.map((_,i)=><div key={i} className={`as-step ${i<cur?'done':i===cur?'cur':''}`}/>)}</div>
    <div className="qtext">{q.q}</div>
    {q.options.map((o,i)=><button key={i} className={`opt ${sel===i?'sel':''}`} onClick={()=>setSel(i)}><span style={{display:'inline-block',width:20,height:20,borderRadius:'50%',background:sel===i?'var(--blue)':'var(--border2)',color:sel===i?'#fff':'var(--text-muted)',textAlign:'center',lineHeight:'20px',fontSize:11,fontWeight:700,marginRight:11}}>{String.fromCharCode(65+i)}</span>{o}</button>)}

// ── Typewriter ────────────────────────────────────────
function useTypewriter(text, speed=12){
  const [out,setOut]=useState('');const [done,setDone]=useState(false);const t=useRef(null);
  useEffect(()=>{setOut('');setDone(false);if(!text)return;let i=0;t.current=setInterval(()=>{i+=4;setOut(text.slice(0,i));if(i>=text.length){clearInterval(t.current);setDone(true);}},speed);return()=>clearInterval(t.current);},[text]);
  return {out,done};
}

// ── Tutor Page ────────────────────────────────────────
function TutorPage({skill,level,roadmap,lessonIdx,completed,onComplete,onNext}){
  const lesson=roadmap[lessonIdx];
  const [lt,setLt]=useState('');const [practice,setPractice]=useState('');const [loading,setLoading]=useState(true);
  const [msgs,setMsgs]=useState([{role:'ai',text:`Hi! I'm your AI tutor. I'll explain "${lesson.title}" clearly. Ask anything!`}]);
  const [chatIn,setChatIn]=useState('');const [chatLoad,setChatLoad]=useState(false);
  const [pAns,setPAns]=useState('');const [pFb,setPFb]=useState('');const [pLoad,setPLoad]=useState(false);
  const [tts,setTts]=useState(false);const [showPanel,setShowPanel]=useState(null); // null | 'notes' | 'practice'
  const [speaking,setSpeaking]=useState(false);
  const [pipeStage,setPipeStage]=useState('idle');
  const chatEnd=useRef(null);
  const {out,done}=useTypewriter(lt);

  useEffect(()=>{load();setMsgs([{role:'ai',text:`Hi! I'm your AI tutor for "${lesson.title}". Ask me anything!`}]);setPAns('');setPFb('');setShowPanel(null);setPipeStage('idle');setSpeaking(false);},[lessonIdx]);
  useEffect(()=>{if(done&&tts&&lt){setPipeStage('voice');setTimeout(()=>{setSpeaking(true);speakWithPipeline(lt,stage=>{setPipeStage(stage);},()=>{setSpeaking(false);setPipeStage('done');});},300);}},[done,tts]);
  useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:'smooth'});},[msgs]);

  async function load(){
    setLoading(true);setLt('');setPractice('');setPipeStage('idle');
    try{
      setPipeStage('llm');
      const t=await callAI([{role:'user',content:`Teach "${lesson.title}" in ${skill.name} at ${level} level. 200 words max. Include: 1) Clear explanation 2) Example or code block 3) Key takeaway. Be warm and conversational.`}],`You are Mentana, expert ${skill.name} tutor. Teach at ${level} level. Be clear, concise, friendly.`,550);
      setLt(t);
      const p=await callAI([{role:'user',content:`Create a 1-2 sentence practice task for "${lesson.title}" in ${skill.name} (${level}). Actionable, 5-10 min.`}],'Return only the task text.',120);
      setPractice(p);
      setPipeStage('avatar');
    }catch{
      setLt(`Welcome to "${lesson.title}" in ${skill.name}!\n\nYour AI tutor is ready to guide you. Ask questions below and I will explain, simplify, and give examples in real time.`);
      setPractice(`Apply "${lesson.title}" by creating a small hands-on example.`);
      setPipeStage('avatar');
    }
    setLoading(false);
  }

  async function sendChat(){
    if(!chatIn.trim()||chatLoad)return;
    const m=chatIn.trim();setChatIn('');
    setMsgs(p=>[...p,{role:'user',text:m}]);
    setChatLoad(true);setPipeStage('student');
    try{
      setPipeStage('llm');
      const h=msgs.slice(1).map(x=>({role:x.role==='user'?'user':'assistant',content:x.text}));
      const r=await callAI([...h,{role:'user',content:m}],`You are Mentana teaching "${lesson.title}" in ${skill.name} (${level}). Answer in 60-80 words. Friendly, give examples.`,320);
      setMsgs(p=>[...p,{role:'ai',text:r}]);
      if(tts){setPipeStage('voice');setSpeaking(true);speakWithPipeline(r,stage=>setPipeStage(stage),()=>{setSpeaking(false);setPipeStage('done');});}
      else{setPipeStage('avatar');setTimeout(()=>setPipeStage('done'),800);}
    }catch{
      setMsgs(p=>[...p,{role:'ai',text:"I couldn't connect right now — try again!"}]);
      setPipeStage('idle');
    }
    setChatLoad(false);
  }

  async function submitP(){
    if(!pAns.trim()||pLoad)return;setPLoad(true);
    try{const fb=await callAI([{role:'user',content:`Task: "${practice}"\nAnswer: "${pAns}"\nSkill: ${skill.name}, Level: ${level}\nGive 70-90 word encouraging feedback. Highlight strengths, 1 improvement, motivational close.`}],'Supportive AI tutor.',260);setPFb(fb);}
    catch{setPFb("Great effort! Every attempt builds your skills. Keep going!");}
    setPLoad(false);
  }

  function fmt(text){return text.split(/(```[\s\S]*?```)/g).map((p,i)=>{if(p.startsWith('```'))return <div key={i} className="code-block">{p.replace(/```\w*\n?/,'').replace(/```$/,'')}</div>;return <span key={i}>{p}</span>;});}

  const isLast=lessonIdx===roadmap.length-1;
  const hasPrev=lessonIdx>0;

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'#0A0B0F',color:'#fff',fontFamily:'var(--font-b)'}}>

      {/* ── TOP NAV BAR ── */}
      <div style={{flexShrink:0,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 24px',background:'rgba(10,11,15,0.95)',borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
        <button onClick={()=>onNext(Math.max(0,lessonIdx-1))} disabled={!hasPrev} style={{background:'none',border:'none',color:hasPrev?'#fff':'rgba(255,255,255,0.2)',cursor:hasPrev?'pointer':'default',fontSize:22,lineHeight:1,padding:'4px 8px'}}>&#8592;</button>
        <div style={{textAlign:'center',flex:1}}>
          <div style={{fontSize:13,color:'#B8A060',fontWeight:600,letterSpacing:'.3px'}}>Module 1: Lesson {lesson.id}</div>
          <div style={{fontSize:15,fontWeight:700,color:'#fff',marginTop:2}}>{lesson.title}</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <button className={`tts-pill ${tts?'on':''}`} onClick={()=>{setTts(!tts);if(tts){stopSpeak();setSpeaking(false);setPipeStage('idle');}}} style={{fontSize:12}}>Voice {tts?'On':'Off'}</button>
          {!isLast&&done&&<button onClick={()=>onNext(lessonIdx+1)} style={{background:'none',border:'none',color:'#B8A060',cursor:'pointer',fontSize:15,fontWeight:700,display:'flex',alignItems:'center',gap:4}}>Next &#8594;</button>}
          {isLast&&done&&<button onClick={onComplete} style={{background:'#4070E8',border:'none',color:'#fff',cursor:'pointer',fontSize:13,fontWeight:700,padding:'7px 16px',borderRadius:8}}>Finish</button>}
        </div>
      </div>

      {/* ── MAIN VIDEO AREA ── */}
      <div style={{flex:1,position:'relative',overflow:'hidden',display:'flex',flexDirection:'column'}}>
        {/* Avatar fills the whole area */}
        <div style={{flex:1,position:'relative',overflow:'hidden'}}>
          <RealisticAvatar speaking={speaking} pipelineStage={pipeStage} fullscreen={true}/>

          {/* Loading overlay */}
          {loading&&(
            <div style={{position:'absolute',inset:0,background:'rgba(10,11,15,0.8)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14}}>
              <Spin s={36}/>
              <div style={{fontSize:14,color:'rgba(255,255,255,0.6)'}}>Preparing your lesson...</div>
            </div>
          )}

          {/* Lesson notes overlay panel */}
          {showPanel==='notes'&&(
            <div style={{position:'absolute',inset:0,background:'rgba(10,11,15,0.92)',overflowY:'auto',padding:'28px 36px'}} className="fade-in">
              <div style={{maxWidth:680,margin:'0 auto'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
                  <div style={{fontFamily:'var(--font-h)',fontSize:17,fontWeight:700,color:'#B8A060'}}>{lesson.title}</div>
                  <button onClick={()=>setShowPanel(null)} style={{background:'rgba(255,255,255,0.08)',border:'none',color:'#fff',cursor:'pointer',fontSize:13,padding:'6px 14px',borderRadius:7}}>Close</button>
                </div>
                <div style={{fontSize:14,lineHeight:1.85,color:'rgba(255,255,255,0.85)',whiteSpace:'pre-wrap'}}>{fmt(out||'Loading lesson notes...')}</div>
              </div>
            </div>
          )}

          {/* Practice lab overlay panel */}
          {showPanel==='practice'&&(
            <div style={{position:'absolute',inset:0,background:'rgba(10,11,15,0.92)',overflowY:'auto',padding:'28px 36px'}} className="fade-in">
              <div style={{maxWidth:680,margin:'0 auto'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
                  <div style={{fontFamily:'var(--font-h)',fontSize:17,fontWeight:700,color:'#B8A060'}}>Practice Lab</div>
                  <button onClick={()=>setShowPanel(null)} style={{background:'rgba(255,255,255,0.08)',border:'none',color:'#fff',cursor:'pointer',fontSize:13,padding:'6px 14px',borderRadius:7}}>Close</button>
                </div>
                <div style={{fontSize:14,color:'rgba(255,255,255,0.6)',marginBottom:16,lineHeight:1.7}}>{practice}</div>
                <textarea style={{width:'100%',minHeight:100,padding:'12px 15px',resize:'vertical',background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.12)',borderRadius:10,color:'#fff',fontSize:14,fontFamily:'var(--font-b)',outline:'none',boxSizing:'border-box'}} placeholder="Write your answer here..." value={pAns} onChange={e=>setPAns(e.target.value)}/>
                <div style={{display:'flex',gap:10,marginTop:12}}>
                  <button onClick={submitP} disabled={!pAns.trim()||pLoad} style={{background:'#4070E8',border:'none',color:'#fff',cursor:pAns.trim()?'pointer':'not-allowed',fontSize:13,fontWeight:600,padding:'10px 20px',borderRadius:8,opacity:pAns.trim()?1:.5,display:'flex',alignItems:'center',gap:8}}>
                    {pLoad&&<Spin s={13}/>}Submit for Feedback
                  </button>
                </div>
                {pFb&&<div style={{marginTop:16,padding:'14px 16px',background:'rgba(61,214,163,0.08)',border:'1px solid rgba(61,214,163,0.2)',borderRadius:10,fontSize:13,color:'rgba(255,255,255,0.85)',lineHeight:1.75}} className="fade-in"><span style={{color:'#3DD6A3',fontWeight:700}}>Feedback: </span>{pFb}</div>}
              </div>
            </div>
          )}

          {/* Chat messages overlay (appears above chat bar when there are messages) */}
          {msgs.length>1&&showPanel===null&&(
            <div style={{position:'absolute',bottom:0,left:0,right:0,maxHeight:'35%',overflowY:'auto',padding:'10px 20px',background:'linear-gradient(transparent,rgba(10,11,15,0.95))',display:'flex',flexDirection:'column',gap:6}}>
              {msgs.slice(-4).map((m,i)=>(
                <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
                  <div style={{maxWidth:'70%',padding:'8px 13px',borderRadius:10,fontSize:13,lineHeight:1.5,background:m.role==='user'?'#4070E8':'rgba(255,255,255,0.1)',color:'#fff',backdropFilter:'blur(8px)'}}>
                    {m.text}
                  </div>
                </div>
              ))}
              {chatLoad&&<div style={{display:'flex'}}><div style={{display:'flex',alignItems:'center',gap:6,padding:'8px 13px',borderRadius:10,background:'rgba(255,255,255,0.1)',fontSize:13,color:'rgba(255,255,255,0.5)'}}><Spin s={12}/>Thinking...</div></div>}
              <div ref={chatEnd}/>
            </div>
          )}
        </div>

        {/* ── ACTION BUTTONS ROW ── */}
        {showPanel===null&&(
          <div style={{flexShrink:0,display:'flex',justifyContent:'flex-end',gap:10,padding:'12px 20px',background:'rgba(10,11,15,0.95)'}}>
            <button onClick={()=>setShowPanel('notes')} style={{background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.12)',color:'#fff',cursor:'pointer',fontSize:13,fontWeight:500,padding:'9px 20px',borderRadius:20,backdropFilter:'blur(8px)',transition:'all .2s'}}>View Notes</button>
            <button onClick={()=>setShowPanel('practice')} style={{background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.12)',color:'#fff',cursor:'pointer',fontSize:13,fontWeight:500,padding:'9px 20px',borderRadius:20,backdropFilter:'blur(8px)',transition:'all .2s'}}>Practice Lab</button>
          </div>
        )}

        {/* ── CHAT INPUT BAR ── */}
        <div style={{flexShrink:0,background:'rgba(20,22,30,0.98)',borderTop:'1px solid rgba(255,255,255,0.06)',padding:'12px 20px',display:'flex',alignItems:'center',gap:10}}>
          {["Explain simply","Give an example","Key takeaway?"].map((s,i)=>(
            <button key={i} onClick={()=>setChatIn(s)} style={{background:'rgba(255,255,255,0.07)',border:'1px solid rgba(255,255,255,0.1)',color:'rgba(255,255,255,0.6)',cursor:'pointer',fontSize:12,padding:'6px 12px',borderRadius:15,whiteSpace:'nowrap',fontFamily:'var(--font-b)',transition:'all .15s'}}>
              {s}
            </button>
          ))}
          <input
            value={chatIn}
            onChange={e=>setChatIn(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&sendChat()}
            placeholder="Ask Your Questions"
            style={{flex:1,background:'transparent',border:'none',color:'#B8A060',fontSize:14,outline:'none',fontFamily:'var(--font-b)'}}
          />
          <button onClick={()=>{}} style={{background:'none',border:'none',color:'rgba(255,255,255,0.4)',cursor:'pointer',fontSize:18,padding:'4px 6px',lineHeight:1}}>&#9741;</button>
          <button onClick={sendChat} disabled={!chatIn.trim()||chatLoad} style={{background:'none',border:'none',color:chatIn.trim()?'#B8A060':'rgba(255,255,255,0.2)',cursor:chatIn.trim()?'pointer':'default',fontSize:20,padding:'4px 6px',lineHeight:1,transform:'rotate(-30deg)'}}>&#10148;</button>
        </div>
      </div>
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────
function Dashboard({user,skill,level,roadmap,completed,onContinue,onNewSkill}){
  const pct=roadmap.length?Math.round((completed.length/roadmap.length)*100):0;
  const nextIdx=completed.length<roadmap.length?completed.length:roadmap.length-1;
  const ti={concept:'📖',practice:'⚡',project:'🚀'};
  return(<div style={{position:'relative',minHeight:'100vh'}}><Stars/><div className="dash-wrap">
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:32,flexWrap:'wrap',gap:12}} className="fade-up">
      <div><div className="badge badge-amber" style={{marginBottom:9}}>👋 Welcome back</div><h1 style={{fontFamily:'var(--font-h)',fontSize:26,fontWeight:800}}>{user.name}</h1><p style={{color:'var(--text-muted)',marginTop:4}}>Consistency is the key to mastery. Keep going!</p></div>
      <div style={{display:'flex',gap:9}}><button className="btn btn-ghost btn-sm" onClick={onNewSkill}>New Skill</button>{roadmap.length>0&&<button className="btn btn-primary" onClick={()=>onContinue(nextIdx)}>Continue Learning</button>}</div>
    </div>
    {skill&&<div className="dash-grid fade-up" style={{animationDelay:'.1s'}}>
      <div className="st-card" style={{borderColor:'rgba(91,141,239,.3)'}}><div className="st-lbl">Current Skill</div><div style={{display:'flex',alignItems:'center',gap:9,marginTop:5}}><span style={{fontSize:26}}>{skill.emoji}</span><div style={{fontFamily:'var(--font-h)',fontWeight:700,fontSize:15}}>{skill.name}</div></div><div style={{marginTop:9}}><div className={`badge badge-${level==='beginner'?'teal':level==='intermediate'?'blue':'amber'}`} style={{textTransform:'capitalize'}}>{level}</div></div></div>
      <div className="st-card" style={{borderColor:'rgba(61,214,163,.3)'}}><div className="st-lbl">Lessons Done</div><div className="st-val" style={{color:'var(--teal)'}}>{completed.length}<span style={{fontSize:15,color:'var(--text-muted)',fontWeight:400}}>/{roadmap.length}</span></div><div className="prog-wrap"><div className="prog-bar" style={{width:`${pct}%`,background:'var(--teal)'}}/></div></div>
      <div className="st-card" style={{borderColor:'rgba(240,160,64,.3)'}}><div className="st-lbl">Progress</div><div className="st-val" style={{color:'var(--amber)'}}>{pct}%</div><div style={{fontSize:12,color:'var(--text-muted)',marginTop:4}}>{pct===100?'🎉 Complete!':pct>50?'More than halfway!':'Building momentum!'}</div></div>
      <div className="st-card"><div className="st-lbl">Up Next</div>{nextIdx<roadmap.length?<><div style={{fontFamily:'var(--font-h)',fontWeight:700,fontSize:14,marginTop:5}}>Lesson {roadmap[nextIdx].id}</div><div style={{fontSize:12.5,color:'var(--text-muted)',marginTop:3}}>{roadmap[nextIdx].title}</div></>:<div style={{fontFamily:'var(--font-h)',fontWeight:700,color:'var(--amber)',marginTop:5}}>🎉 All Done!</div>}</div>
    </div>}
    {roadmap.length>0&&<div className="trk fade-up" style={{animationDelay:'.2s'}}><h3>Lesson Tracker</h3>
      {roadmap.map((l,i)=>{const d=completed.includes(i);const c=i===nextIdx&&!d;return(<div key={l.id} className="trk-row"><div className={`trk-ck ${d?'done':c?'cur':'lock'}`}>{d?'✓':c?'▶':l.id}</div><div style={{flex:1}}><div style={{fontWeight:600,fontSize:13,color:d?'var(--teal)':c?'var(--blue)':'var(--text-muted)'}}>{l.title}</div><div style={{fontSize:11.5,color:'var(--text-dim)'}}>{l.duration} · {l.type}</div></div><span>{ti[l.type]||'📖'}</span>{c&&<button className="btn btn-primary btn-sm" onClick={()=>onContinue(i)}>Continue</button>}{d&&<div className="badge badge-teal" style={{fontSize:11}}>Done ✓</div>}</div>);})}
    </div>}
  </div></div>);
}

// ── App ────────────────────────────────────────────────
function App(){
  const [view,setView]=useState('landing');
  const [user,setUser]=useState(null);
  const [skill,setSkill]=useState(null);
  const [level,setLevel]=useState(null);
  const [levelExp,setLevelExp]=useState('');
  const [roadmap,setRoadmap]=useState(null);
  const [lessonIdx,setLessonIdx]=useState(0);
  const [completed,setCompleted]=useState([]);
  const go=v=>{setView(v);window.scrollTo(0,0);};
  return(<div>
    {view!=='tutor'&&<Navbar user={user} onNav={go}/>}
    {view==='landing'&&<Landing onStart={()=>go(user?'skill-select':'auth')}/>}
    {view==='auth'&&<Auth onAuth={u=>{setUser(u);go('skill-select');}}/>}
    {view==='skill-select'&&<SkillSelect user={user} onSelect={s=>{setSkill(s);go('assessment');}}/>}
    {view==='assessment'&&skill&&<Assessment skill={skill} onComplete={(l,e)=>{setLevel(l);setLevelExp(e);setRoadmap(null);setCompleted([]);go('roadmap');}}/>}
    {view==='roadmap'&&skill&&level&&<Roadmap skill={skill} level={level} explanation={levelExp} roadmap={roadmap} onStart={i=>{setLessonIdx(i);go('tutor');}} onGenerate={setRoadmap}/>}
    {view==='tutor'&&skill&&level&&roadmap&&<TutorPage skill={skill} level={level} roadmap={roadmap} lessonIdx={lessonIdx} completed={completed} onComplete={()=>{setCompleted(Array.from({length:roadmap.length},(_,i)=>i));go('dashboard');}} onNext={i=>{setCompleted(p=>p.includes(lessonIdx)?p:[...p,lessonIdx]);setLessonIdx(i);}}/>}
    {view==='dashboard'&&<Dashboard user={user} skill={skill} level={level} roadmap={roadmap||[]} completed={completed} onContinue={i=>{setLessonIdx(i);go('tutor');}} onNewSkill={()=>{setSkill(null);setLevel(null);setRoadmap(null);setCompleted([]);go('skill-select');}}/>}
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
